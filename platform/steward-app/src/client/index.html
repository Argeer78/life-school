<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Steward — Private Local Prototype</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow">Life School</p>
          <h1>Steward</h1>
          <p class="subtitle">Private local conversation prototype</p>
        </div>
        <button id="clear" class="secondary" type="button">Clear</button>
      </header>

      <p class="limitation" role="note">
        Steward may be mistaken and is not a final authority. Your judgment and
        responsibility remain your own.
      </p>

      <section
        id="transcript"
        class="transcript"
        aria-label="Conversation"
        aria-live="polite"
      >
        <p class="empty">No messages yet.</p>
      </section>

      <form id="message-form" class="composer">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="3"
          maxlength="4000"
          autocomplete="off"
          required
        ></textarea>
        <div class="composer-actions">
          <p class="privacy">This transcript exists only in this browser tab.</p>
          <button id="send" type="submit">Send</button>
        </div>
      </form>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
